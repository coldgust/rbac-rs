openapi: 3.0.3
info:
  title: RBAC System API
  description: Role-Based Access Control system backend
  version: 1.0.0
servers:
  - url: http://localhost:3000/api/v1
    description: Development server
paths:
  /auth/register:
    post:
      summary: Register new user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
  /auth/login:
    post:
      summary: Login user
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/TokenResponse'
  /auth/refresh:
    post:
      summary: Refresh access token
      tags:
        - Authentication
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RefreshRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RefreshResponse'
  /auth/logout:
    post:
      summary: Logout and revoke refresh token
      tags:
        - Authentication
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LogoutRequest'
      responses:
        '204':
          description: No Content
  /users:
    get:
      summary: List users
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: username
          in: query
          schema:
            type: string
        - name: email
          in: query
          schema:
            type: string
        - name: status
          in: query
          schema:
            type: integer
            enum: [ 0, 1, 2 ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserListResponse'
    post:
      summary: Create user (admin)
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
  /users/{id}:
    get:
      summary: Get user by ID
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserDetailResponse'
    put:
      summary: Update user
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserResponse'
    delete:
      summary: Delete user (soft delete)
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: No Content
  /users/{id}/roles:
    post:
      summary: Assign roles to user
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignRolesRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/RoleBrief'
  /users/{id}/roles/{role_id}:
    delete:
      summary: Remove a role from user
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
        - name: role_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
  /users/{id}/roles-permissions:
    get:
      summary: Get user's roles and permissions (with inheritance)
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserRolesPermissionsResponse'
  /me:
    get:
      summary: Get current user info
      tags:
        - Users
      security:
        - bearerAuth: [ ]
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/UserDetailResponse'
  /roles:
    get:
      summary: List roles
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: name
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RoleListResponse'
    post:
      summary: Create role
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateRoleRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
  /roles/{id}:
    get:
      summary: Get role by ID with permissions
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RoleDetailResponse'
    put:
      summary: Update role
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateRoleRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/RoleResponse'
    delete:
      summary: Delete role (soft delete, system roles cannot be deleted)
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: No Content
  /roles/{id}/permissions:
    post:
      summary: Assign permissions to role
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/AssignPermissionsRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/PermissionBrief'
  /roles/{id}/permissions/{perm_id}:
    delete:
      summary: Remove a permission from role
      tags:
        - Roles
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
        - name: perm_id
          in: path
          required: true
          schema:
            type: string
      responses:
        '204':
          description: No Content
  /permissions:
    get:
      summary: List permissions
      tags:
        - Permissions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/page'
        - $ref: '#/components/parameters/pageSize'
        - name: resource
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/PermissionListResponse'
    post:
      summary: Create permission
      tags:
        - Permissions
      security:
        - bearerAuth: [ ]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreatePermissionRequest'
      responses:
        '201':
          description: Created
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/PermissionResponse'
  /permissions/{id}:
    get:
      summary: Get permission by ID
      tags:
        - Permissions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/PermissionResponse'
    put:
      summary: Update permission
      tags:
        - Permissions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionRequest'
      responses:
        '200':
          description: Success
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/ApiResponse'
                  - properties:
                      data:
                        $ref: '#/components/schemas/PermissionResponse'
    delete:
      summary: Delete permission (soft delete)
      tags:
        - Permissions
      security:
        - bearerAuth: [ ]
      parameters:
        - $ref: '#/components/parameters/id'
      responses:
        '204':
          description: No Content

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  parameters:
    id:
      name: id
      in: path
      required: true
      schema:
        type: string
      description: UUID of the resource
    page:
      name: page
      in: query
      schema:
        type: integer
        minimum: 1
        default: 1
      description: Page number
    pageSize:
      name: page_size
      in: query
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 10
      description: Number of items per page

  schemas:
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: Business code, 0 for success
          example: 0
        message:
          type: string
          example: success
        data:
          type: object
          nullable: true
          description: Payload, varies per endpoint

    # Auth
    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 64
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8
        full_name:
          type: string
          nullable: true

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string

    TokenResponse:
      type: object
      properties:
        access_token:
          type: string
        refresh_token:
          type: string
        token_type:
          type: string
          example: Bearer
        expires_in:
          type: integer
          description: Seconds until access token expires

    RefreshRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    RefreshResponse:
      type: object
      properties:
        access_token:
          type: string
        token_type:
          type: string
        expires_in:
          type: integer
        refresh_token:
          type: string
          nullable: true

    LogoutRequest:
      type: object
      required:
        - refresh_token
      properties:
        refresh_token:
          type: string

    # User
    UserBrief:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        email:
          type: string
        full_name:
          type: string
          nullable: true
        status:
          type: integer
          description: 1=active, 0=inactive, 2=locked

    UserResponse:
      allOf:
        - $ref: '#/components/schemas/UserBrief'
        - type: object
          properties:
            last_login_at:
              type: integer
              format: int64
              nullable: true
              description: Unix timestamp (milliseconds)
            created_at:
              type: integer
              format: int64
              description: Unix timestamp (milliseconds)
            updated_at:
              type: integer
              format: int64
              description: Unix timestamp (milliseconds)
            roles:
              type: array
              items:
                $ref: '#/components/schemas/RoleBrief'

    UserDetailResponse:
      allOf:
        - $ref: '#/components/schemas/UserResponse'
        - type: object
          properties:
            permissions:
              type: array
              items:
                type: string
                example: "user:read"

    UserListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/UserBrief'

    CreateUserRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
        email:
          type: string
        password:
          type: string
        full_name:
          type: string
          nullable: true
        status:
          type: integer
          default: 1

    UpdateUserRequest:
      type: object
      properties:
        full_name:
          type: string
          nullable: true
        email:
          type: string
        status:
          type: integer

    AssignRolesRequest:
      type: object
      required:
        - role_ids
      properties:
        role_ids:
          type: array
          items:
            type: string
        expires_at:
          type: integer
          format: int64
          nullable: true
          description: Unix timestamp (milliseconds), optional expiry

    UserRolesPermissionsResponse:
      type: object
      properties:
        roles:
          type: array
          items:
            $ref: '#/components/schemas/UserRoleBrief'
        permissions:
          type: array
          items:
            type: string

    UserRoleBrief:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
          nullable: true

    # Role
    RoleBrief:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
          nullable: true

    RoleResponse:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        display_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        is_system:
          type: boolean
        sort_order:
          type: integer
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)
        updated_at:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)

    RoleDetailResponse:
      allOf:
        - $ref: '#/components/schemas/RoleResponse'
        - type: object
          properties:
            permissions:
              type: array
              items:
                $ref: '#/components/schemas/PermissionBrief'

    RoleListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/RoleResponse'

    CreateRoleRequest:
      type: object
      required:
        - name
      properties:
        name:
          type: string
        display_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        sort_order:
          type: integer
          default: 0

    UpdateRoleRequest:
      type: object
      properties:
        display_name:
          type: string
          nullable: true
        description:
          type: string
          nullable: true
        sort_order:
          type: integer

    AssignPermissionsRequest:
      type: object
      required:
        - permission_ids
      properties:
        permission_ids:
          type: array
          items:
            type: string

    # Permission
    PermissionBrief:
      type: object
      properties:
        id:
          type: string
        resource:
          type: string
        action:
          type: string
        name:
          type: string

    PermissionResponse:
      type: object
      properties:
        id:
          type: string
        resource:
          type: string
        action:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        resource_path:
          type: string
          nullable: true
        http_method:
          type: string
          nullable: true
        created_at:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)
        updated_at:
          type: integer
          format: int64
          description: Unix timestamp (milliseconds)

    PermissionListResponse:
      type: object
      properties:
        total:
          type: integer
        page:
          type: integer
        page_size:
          type: integer
        items:
          type: array
          items:
            $ref: '#/components/schemas/PermissionResponse'

    CreatePermissionRequest:
      type: object
      required:
        - resource
        - action
        - name
      properties:
        resource:
          type: string
        action:
          type: string
        name:
          type: string
        description:
          type: string
          nullable: true
        resource_path:
          type: string
          nullable: true
        http_method:
          type: string
          nullable: true

    UpdatePermissionRequest:
      type: object
      properties:
        name:
          type: string
        description:
          type: string
          nullable: true
        resource_path:
          type: string
          nullable: true
        http_method:
          type: string
          nullable: true

  responses:
    Unauthorized:
      description: Unauthorized
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - properties:
                  code:
                    example: 10002
                  message:
                    example: Unauthorized
    Forbidden:
      description: Forbidden
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - properties:
                  code:
                    example: 40002
                  message:
                    example: Forbidden
    NotFound:
      description: Not Found
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - properties:
                  code:
                    example: 30003
                  message:
                    example: Resource not found
    BadRequest:
      description: Bad Request
      content:
        application/json:
          schema:
            allOf:
              - $ref: '#/components/schemas/ApiResponse'
              - properties:
                  code:
                    example: 40001
                  message:
                    example: Invalid request parameters